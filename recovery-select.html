<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pathwell Onboarding - Select Recovery Journey</title>
    <!-- We will link the updated, combined stylesheet here -->
    <link rel="stylesheet" href="pathwell_style.css">
</head>
<body class="wizard-body">

    <div class="onboarding-container card-select-page">
        <!-- Brand Header (Centered) -->
        <header class="brand-header centered-header">
            <!-- Ensure logo path matches your local image location -->
            <img src="pathwell_logo.png" alt="Pathwell Recovery Group Logo" class="brand-logo">
        </header>

        <!-- wizard Content Section -->
        <main class="wizard-content">
            <h1 class="main-title">What would you like to recover from?</h1>
            <p class="sub-title">Select all that apply. This helps us personalize your journey.</p>
            <p class="instruction-text">Choose at least one</p>

            <!-- Choice Grid -->
            <div class="selection-grid">
                
                <!-- Item 1 (Alcohol) - Pre-selected example -->
                <div class="select-card selected">
                    <span class="choice-emoji">🍺</span>
                    <span class="choice-label">Alcohol</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 2 (Drugs) -->
                <div class="select-card">
                    <span class="choice-emoji">💊</span>
                    <span class="choice-label">Drugs</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 3 (Cocaine) -->
                <div class="select-card">
                    <span class="choice-emoji">❄️</span>
                    <span class="choice-label">Cocaine</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 4 (Marijuana) - Pre-selected example -->
                <div class="select-card selected">
                    <span class="choice-emoji">🌿</span>
                    <span class="choice-label">Marijuana</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 5 (Prescription Drugs) -->
                <div class="select-card">
                    <span class="choice-emoji">💊</span>
                    <span class="choice-label">Prescription Drugs</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 6 (Pornography) -->
                <div class="select-card">
                    <span class="choice-emoji">🔞</span>
                    <span class="choice-label">Pornography</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 7 (Gambling) -->
                <div class="select-card">
                    <span class="choice-emoji">🎰</span>
                    <span class="choice-label">Gambling</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 8 (Food / Eating) -->
                <div class="select-card">
                    <span class="choice-emoji">🍽️</span>
                    <span class="choice-label">Food / Eating</span>
                    <span class="checkmark-icon">✓</span>
                </div>

                <!-- Item 9 (Other) - Full Width -->
                <div class="select-card full-width">
                    <span class="choice-emoji">💪</span>
                    <span class="choice-label">Other</span>
                    <span class="checkmark-icon">✓</span>
                </div>

            </div> <!-- end grid -->
        </main>

        <!-- Continue Button Area -->
        <footer class="action-footer">
            <!-- Green brand button with right arrow -->
            <button class="brand-btn primary-btn continue-btn">
                Continue
                <span class="arrow">→</span>
            </button>
        </footer>
    </div>

</body>
</html>
